# Build dashboard image, push to ECR, update ECS service
#
# This workflow uses OIDC role assumption only.
# Required repository secrets:
#   AWS_DEPLOY_ROLE_ARN
#   AWS_REGION
#   ECR_DASHBOARD_REPOSITORY
#   ECS_CLUSTER
#   ECS_SERVICE_DASHBOARD
name: deploy-production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dashboard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate required deploy secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.ECR_DASHBOARD_REPOSITORY }}"
          test -n "${{ secrets.ECS_CLUSTER }}"
          test -n "${{ secrets.ECS_SERVICE_DASHBOARD }}"

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          set -euo pipefail
          TAG="${{ github.sha }}"
          ECR="${{ secrets.ECR_DASHBOARD_REPOSITORY }}"
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL="https://app.hyrelog.com" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="https://api.hyrelog.com" \
            -t "$ECR:$TAG" -t "$ECR:latest" .
          docker push "$ECR:$TAG"
          docker push "$ECR:latest"

      # Task definition image must reference the pushed tag. --force-new-deployment alone
      # keeps an old immutable tag (e.g. ...:202604291706-...) and production never updates.
      - name: Register task definition revision and deploy ECS
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_DASHBOARD_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_DASHBOARD: ${{ secrets.ECS_SERVICE_DASHBOARD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TASK_DEFINITION_FAMILY: hyrelog-dashboard
        run: |
          set -euo pipefail
          FULL_IMAGE="${ECR_REPOSITORY}:${IMAGE_TAG}"
          TMP="$(mktemp)"
          aws ecs describe-task-definition \
            --task-definition "${TASK_DEFINITION_FAMILY}" \
            --region "${AWS_REGION}" \
            --query 'taskDefinition' \
            --output json > "${TMP}"

          REGISTER_JSON="$(jq --arg IMG "$FULL_IMAGE" \
            'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .compatibilities,
              .registeredAt,
              .registeredBy,
              .requiresAttributes,
              .tags,
              .deregisteredAt,
              .enableFaultInjection
            )
            | del(.capacityProviderStrategy)
            | .containerDefinitions[0].image = $IMG
            ' "${TMP}")"
          rm -f "${TMP}"

          OUT="$(echo "${REGISTER_JSON}" | aws ecs register-task-definition \
            --cli-input-json file:///dev/stdin \
            --region "${AWS_REGION}" \
            --output json)"
          REV="$(echo "${OUT}" | jq -r '[.taskDefinition.family, (.taskDefinition.revision | tostring)] | join(":")')"

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE_DASHBOARD}" \
            --task-definition "${REV}" \
            --region "${AWS_REGION}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait stable
        run: |
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_DASHBOARD" --region "$AWS_REGION"
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_DASHBOARD: ${{ secrets.ECS_SERVICE_DASHBOARD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: On failure — ECS service events
        if: failure()
        run: |
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_DASHBOARD" --region "${AWS_REGION}" --query 'services[0].events[:8]' --output json || true
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_DASHBOARD: ${{ secrets.ECS_SERVICE_DASHBOARD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
